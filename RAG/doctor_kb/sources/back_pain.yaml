    text: {zh: "腰背痛合并外伤、发热或神经症状需要优先评估。", en: "Back pain with trauma, fever, or neurologic symptoms needs urgent evaluation."}
    rationale: {zh: "这些问题提示可能存在骨折、感染或马尾综合征风险，所以会优先询问。", en: "These suggest fracture, infection, or cauda equina risk, so we ask early."}
    tags: ["back_pain", "red_flag"]
