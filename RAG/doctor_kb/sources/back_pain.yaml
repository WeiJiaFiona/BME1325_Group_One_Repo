explanations:
  - explanation_id: bp_imaging
    topic: imaging_choice
    text:
      zh: "腰背痛是否需要影像取决于是否有外伤、发热或神经症状等红旗表现；若存在红旗，医生可能会考虑X光或CT/MRI来评估骨折或神经压迫等情况。"
      en: "Imaging for back pain depends on red flags like trauma, fever, or neurologic symptoms; if present, X-ray/CT/MRI may be considered."
    scope: patient_facing
    related_tests: ["X-ray", "CT", "MRI"]
    tags: ["back_pain", "imaging"]
red_flags:
