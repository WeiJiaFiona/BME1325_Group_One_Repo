    topic: ecg_first
    text:
      zh: "头晕如果伴有心悸、胸闷或差点晕倒，医生通常会优先做心电图和生命体征评估，以排除心律失常等需要紧急处理的问题。"
      en: "If dizziness comes with palpitations or near-fainting, ECG and vitals are often prioritized to rule out arrhythmias."
    scope: patient_facing
    related_tests: ["ECG"]
    tags: ["dizziness", "ecg"]
red_flags:
