    purpose: "Red flags for serious neurologic events."
    tags: ["syncope", "headache"]
explanations:
  - explanation_id: hd_ct_mri
    topic: ct_vs_mri
    text:
      zh: "突发剧烈头痛、伴神经功能异常、外伤后头痛或出现意识改变时，医生通常会优先考虑急诊影像评估；急诊常先做头颅CT排除出血等紧急情况，必要时再进一步做MRI评估。"
      en: "For sudden severe headache, neurologic deficits, post-trauma headache, or altered mental status, urgent imaging may be needed. In the ED, CT is often first to rule out hemorrhage; MRI may follow for further evaluation."
    scope: patient_facing
    related_tests: ["CT", "MRI"]
    tags: ["headache", "imaging", "ct", "mri"]
  - explanation_id: hd_why_onset
    topic: why_onset
    text:
      zh: "我先问起病时间，是因为某些严重原因（例如出血或中风相关问题）对时间非常敏感，明确起病时间有助于决定检查优先级。"
      en: "I ask about onset time because some dangerous causes are time-sensitive; knowing onset helps prioritize urgent tests."
    scope: patient_facing
    related_tests: []
    tags: ["headache", "explain"]
red_flags:
  - red_flag_id: hd_redflags
    text:
      zh: "突发最严重头痛、意识改变、抽搐、明显单侧无力或持续呕吐需要优先处理。"
      en: "Sudden worst headache, altered mental status, seizure, focal weakness, or persistent vomiting needs urgent evaluation."
    rationale:
      zh: "这些表现提示可能存在颅内出血或严重神经系统问题，需要先排除危及生命的原因。"
      en: "These features may indicate intracranial hemorrhage or serious neurologic disease and require urgent workup."
    tags: ["headache", "red_flag"]
exam_focus: ["neuro exam", "vital signs", "meningismus screening"]
test_considerations: ["CT head", "consider MRI", "basic labs if febrile", "ECG if syncope"]
