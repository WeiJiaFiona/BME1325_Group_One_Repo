complaint_id: headache
title: Headache
aliases: ["headache", "severe headache", "头痛", "头很疼", "剧烈头痛"]
keywords: ["worst headache", "sudden onset", "neck stiffness", "vomiting", "突发", "最严重头痛", "颈项强直", "呕吐"]
related_symptoms: ["nausea", "vomiting", "neuro_deficit", "syncope", "fever"]
required_slots: ["duration", "worsening_pain", "syncope", "fever", "vomiting"]
question_graph:
  - question_id: hd_duration
    link_id: headache.duration
    slot: duration
    text: {zh: "头痛是从什么时候开始的（大概几点/哪一天）？", en: "When did the headache start (roughly what time/day)?"}
    type: string
    required: true
    enable_when: []
