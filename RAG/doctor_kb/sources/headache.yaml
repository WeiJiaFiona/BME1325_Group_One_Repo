    type: boolean
    required: true
    enable_when: []
    answer_options: []
    purpose: "Worsening pattern can imply intracranial pathology."
    tags: ["worsening_pain", "headache"]
  - question_id: hd_syncope
    link_id: headache.syncope
    slot: syncope
