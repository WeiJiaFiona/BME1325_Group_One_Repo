    topic: ecg_first
    text:
      zh: "心悸常见的第一步检查是心电图和生命体征评估；如果症状间歇性，医生也可能根据情况安排动态心电监测或抽血检查电解质等。"
      en: "First-line evaluation for palpitations often includes ECG and vitals; if intermittent, ambulatory monitoring or labs (electrolytes) may be considered."
